<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Кунжутик · Фабрика контента</title>
    <link rel="stylesheet" href="/static/admin.css?v=20260703-redesign-v2" />
  </head>
  <body>
    <header class="topbar">
      <span class="brand"><span class="brand-dot">К</span> Кунжутик · Фабрика контента</span>
      <nav role="tablist">
        <button class="is-active" type="button" data-tab="content">Контент</button>
        <button type="button" data-tab="orders">Заказы</button>
      </nav>
      <button class="ghost" type="button" id="logout-button">Выйти</button>
    </header>

    <main class="shell">
      <section id="content-tab" class="layout">
        <aside class="side">
          <div class="card">
            <p class="section-title">Новый ролик</p>
            <form class="upload-form" id="upload-form">
              <select id="project-select" required></select>
              <label class="file-drop" id="file-drop">
                <span id="file-drop-label">Выберите фото блюда</span>
                <input id="upload-file" type="file" accept="image/*" required />
              </label>
              <input id="upload-notes" type="text" placeholder="Комментарий (необязательно)" />
              <button class="btn primary block" type="submit">Запустить конвейер</button>
            </form>
          </div>
          <div class="card">
            <div class="row" style="display:flex;justify-content:space-between;align-items:center">
              <p class="section-title" style="margin:0">Загрузки</p>
              <button class="btn subtle" type="button" id="refresh-pipeline">Обновить</button>
            </div>
            <div class="upload-list" id="upload-list" style="margin-top:10px"></div>
          </div>
          <div class="card" id="provider-diagnostics"></div>
        </aside>
        <section id="pipeline-detail"></section>
      </section>

      <section id="orders-tab" class="hidden">
        <div class="card" style="margin-bottom:14px">
          <button class="btn subtle" type="button" id="refresh-orders">Обновить заказы</button>
        </div>
        <div class="orders-list" id="orders"></div>
      </section>
    </main>
    <script src="/static/admin.js?v=20260703-redesign-v2" defer></script>
  </body>
</html>
