<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Кунжутик · Вход</title>
    <link rel="stylesheet" href="/static/admin.css?v=20260703-redesign-v2" />
    <style>
      body { display: grid; place-items: center; min-height: 100vh; padding: 24px; }
      .login-card { width: min(100%, 400px); }
      .login-form { display: grid; gap: 12px; margin-top: 16px; }
      .login-form input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 12px 14px;
        font: inherit;
        background: #fafbfc;
      }
      .login-form input:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
      .login-error { min-height: 22px; color: var(--red); font-size: 0.9rem; margin: 0; }
      .login-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; }
    </style>
  </head>
  <body>
    <main class="card login-card">
      <p class="login-brand"><span class="brand-dot">К</span> Кунжутик · Фабрика контента</p>
      <h1 style="margin-top:12px">Вход для оператора</h1>
      <form class="login-form" id="login-form">
        <input name="username" autocomplete="username" placeholder="Логин" required />
        <input name="password" type="password" autocomplete="current-password" placeholder="Пароль" required />
        <button class="btn primary block" type="submit">Войти</button>
        <p class="login-error" id="login-error"></p>
      </form>
    </main>
    <script>
      document.getElementById("login-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const error = document.getElementById("login-error");
        error.textContent = "";
        const form = new FormData(event.currentTarget);
        const response = await fetch("/api/v1/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: form.get("username"), password: form.get("password") }),
        });
        if (!response.ok) {
          error.textContent = "Неверный логин или пароль.";
          return;
        }
        window.location.href = "/admin";
      });
    </script>
  </body>
</html>
