<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kunzhutik Operator Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260514-storefront-polish-v1" />
    <style>
      .admin-shell { width:min(calc(100% - 32px), 1380px); margin:0 auto; padding:24px 0 72px; }
      .admin-hero { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:22px; align-items:end; padding:28px; border:1px solid var(--line); border-radius:30px; background:linear-gradient(135deg, rgba(255,122,47,.16), rgba(75,192,141,.1)), rgba(255,246,234,.06); box-shadow:var(--shadow-md); }
      .admin-hero h1 { margin:.25rem 0 .5rem; font-size:clamp(2.15rem,4vw,4.4rem); line-height:.95; max-width:920px; }
      .admin-tabs, .admin-actions, .card-actions, .status-row { display:flex; gap:10px; flex-wrap:wrap; }
      .admin-tabs button, .admin-actions button, .card-actions button, .upload-form button { border:1px solid var(--line); border-radius:999px; padding:11px 15px; background:rgba(255,246,234,.09); color:var(--ink); font-weight:900; cursor:pointer; }
      .admin-tabs button.is-active, .admin-actions button.primary, .upload-form button { background:linear-gradient(135deg, var(--accent), #ffb24d); border-color:transparent; color:#fff; }
      .admin-layout { display:grid; grid-template-columns:390px minmax(0,1fr); gap:18px; margin-top:18px; }
      .admin-panel, .admin-card { border:1px solid var(--line); border-radius:26px; background:rgba(255,246,234,.07); box-shadow:var(--shadow-sm); }
      .admin-panel { padding:16px; align-self:start; position:sticky; top:86px; }
      .admin-card { padding:18px; margin-bottom:14px; }
      .upload-list, .orders-list { display:grid; gap:10px; margin-top:14px; }
      .upload-item { width:100%; text-align:left; border:1px solid var(--line); border-radius:18px; padding:13px; background:rgba(16,16,15,.34); color:var(--ink); cursor:pointer; }
      .upload-item.is-active { border-color:rgba(255,122,47,.72); background:rgba(255,122,47,.14); }
      .muted { color:var(--ink-soft); }
      .pill { display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:999px; padding:7px 10px; color:var(--ink-soft); background:rgba(255,246,234,.06); font-size:.84rem; font-weight:800; }
      .pill.good { color:#bdf3d8; background:var(--green-soft); }
      .pill.warn { color:#ffdca0; background:rgba(255,202,97,.13); }
      .pipeline-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
      .wide { grid-column:1 / -1; }
      .draft-card, .asset-card, .publication-card { border:1px solid var(--line); border-radius:20px; padding:14px; background:rgba(0,0,0,.16); }
      .asset-grid, .publication-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; }
      .upload-form { display:grid; gap:10px; margin-top:14px; }
      .upload-form input, .upload-form select { width:100%; border:1px solid var(--line); border-radius:16px; padding:12px; color:var(--ink); background:rgba(0,0,0,.22); }
      .order-card { border:1px solid var(--line); border-radius:24px; padding:18px; background:rgba(255,246,234,.07); }
      .order-head, .order-meta { display:flex; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
      .order-items { margin:1rem 0; padding-left:1rem; color:var(--ink-soft); }
      .hidden { display:none !important; }
      @media (max-width: 920px) { .admin-hero, .admin-layout, .pipeline-grid { grid-template-columns:1fr; } .admin-panel { position:static; } }
    </style>
  </head>
  <body>
    <main class="admin-shell">
      <section class="admin-hero">
        <div>
          <p class="eyebrow">Operator Dashboard</p>
          <h1>Контент, заказы и публикации в одном пульте</h1>
          <p class="hero-text">Минимальная production-панель для проверки полного пайплайна: upload → drafts → approval → publication.</p>
        </div>
        <div class="admin-tabs" role="tablist">
          <button class="is-active" type="button" data-tab="content">Content Pipeline</button>
          <button type="button" data-tab="orders">Store Orders</button>
        </div>
      </section>

      <section id="content-tab" class="admin-layout">
        <aside class="admin-panel">
          <div class="admin-actions">
            <button class="primary" type="button" id="refresh-pipeline">Обновить</button>
          </div>
          <form class="upload-form" id="upload-form">
            <select id="project-select" required></select>
            <input id="upload-file" type="file" accept="image/*,.svg" required />
            <input id="upload-notes" type="text" placeholder="Комментарий к загрузке" />
            <button type="submit">Загрузить фото в pipeline</button>
          </form>
          <div class="upload-list" id="upload-list"></div>
        </aside>
        <section id="pipeline-detail"></section>
      </section>

      <section id="orders-tab" class="hidden">
        <div class="admin-card">
          <div class="admin-actions">
            <button class="primary" type="button" id="refresh-orders">Обновить заказы</button>
          </div>
        </div>
        <div class="orders-list" id="orders"></div>
      </section>
    </main>
    <script src="/static/admin.js?v=20260514-dashboard-v1" defer></script>
  </body>
</html>
