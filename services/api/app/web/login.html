<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kunzhutik Dashboard Login</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260514-telegram-storefront-v1" />
    <style>
      body { display:grid; place-items:center; padding:24px; }
      .login-card { width:min(100%,420px); border:1px solid var(--line); border-radius:28px; padding:28px; background:rgba(255,246,234,.08); box-shadow:var(--shadow-md); }
      .login-card h1 { margin:.25rem 0 1rem; font-size:clamp(2rem,8vw,3.2rem); }
      .login-form { display:grid; gap:12px; }
      .login-form input { width:100%; border:1px solid var(--line); border-radius:16px; padding:13px 14px; color:var(--ink); background:rgba(0,0,0,.24); }
      .login-form input:focus { outline:none; border-color:rgba(255,202,97,.62); box-shadow:0 0 0 4px rgba(255,202,97,.12); }
      .login-error { min-height:24px; color:#ffb6a8; }
    </style>
  </head>
  <body>
    <main class="login-card">
      <p class="eyebrow">Operator access</p>
      <h1>Вход в dashboard</h1>
      <form class="login-form" id="login-form">
        <input name="username" autocomplete="username" placeholder="Логин" required />
        <input name="password" type="password" autocomplete="current-password" placeholder="Пароль" required />
        <button class="button button-primary button-block" type="submit">Войти</button>
        <p class="login-error" id="login-error"></p>
      </form>
    </main>
    <script>
      document.getElementById("login-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const error = document.getElementById("login-error");
        error.textContent = "";
        const form = new FormData(event.currentTarget);
        const response = await fetch("/api/v1/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: form.get("username"), password: form.get("password") }),
        });
        if (!response.ok) {
          error.textContent = "Неверный логин или пароль.";
          return;
        }
        window.location.href = "/admin/orders";
      });
    </script>
  </body>
</html>
